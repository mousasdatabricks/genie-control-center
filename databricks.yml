bundle:
  name: genie-control-center

variables:
  sql_warehouse_id:
    description: SQL Warehouse ID for analytics queries
  postgres_branch:
    description: >-
      Full Lakebase Postgres branch resource name.
      Run `databricks postgres list-branches projects/{project-id}` and use the .name value.
  postgres_database:
    description: >-
      Full Lakebase Postgres database resource name.
      Run `databricks postgres list-databases {branch-name}` and use the .name value.

resources:
  apps:
    app:
      name: genie-control-center
      description: "Genie Control Center — usage, adoption, quality and cost governance for AI/BI Genie"
      source_code_path: ./
      # Uncomment to enable on behalf of user API scopes.
      # user_api_scopes:
      #   - sql

      resources:
        - name: sql-warehouse
          sql_warehouse:
            id: ${var.sql_warehouse_id}
            permission: CAN_USE
        - name: postgres
          postgres:
            branch: ${var.postgres_branch}
            database: ${var.postgres_database}
            permission: CAN_CONNECT_AND_CREATE

targets:
  default:
    default: true
    workspace:
      host: https://YOUR-WORKSPACE.cloud.databricks.com

    variables:
      sql_warehouse_id: YOUR_SQL_WAREHOUSE_ID
      postgres_branch: projects/YOUR-LAKEBASE-PROJECT/branches/production
      postgres_database: projects/YOUR-LAKEBASE-PROJECT/branches/production/databases/databricks-postgres
